name: compliance

on:
  push:
    branches: [main, "recover-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and CI tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: make lint

      - name: Run typecheck
        run: make typecheck

      - name: Run unit discovery
        run: make test

      - name: Run protocol gate
        run: make test-protocol

      - name: Run integration gate
        run: make test-integration

      - name: Run required docs gate
        run: make test-docs-required

      - name: Run schema drift gate
        run: make test-schema-drift

      - name: Run dogfood smoke
        run: make dogfood-smoke DOGFOOD_PORT=8765

      - name: Validate SWE-bench smoke preflight
        run: make benchmark-smoke

      - name: Refresh full compliance report
        run: make compliance

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: |
            reports/compliance/**
            reports/benchmark/**
            reports/dogfood/**
            docs/dogfood/**
          if-no-files-found: ignore
          retention-days: 14
